<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Загрузка модели</title>

{% load static %}

<link rel="stylesheet" href="{% static 'gallery/style.css' %}">

</head>

<body>

<header class="main-header">

<div class="header-left">
<img src="{% static 'gallery/Screenshot_2.jpg' %}" class="logo">
<span class="logo-text">SibSutiZ 3D</span>
</div>

<nav class="header-nav">
<a href="{% url 'home' %}">Галерея</a>
<a href="{% url 'about' %}">О нас</a>
</nav>

</header>


<div class="upload-wrapper">

<div class="upload-card">

<h2 class="upload-title">📦 Загрузить новую 3D модель</h2>

<form method="post" enctype="multipart/form-data">
{% csrf_token %}

<div class="form-group">
{{ form.title.label_tag }}
{{ form.title }}
</div>

<div class="form-group">
{{ form.file.label_tag }}
{{ form.file }}

<div id="file-error" class="error-msg" style="display:none;">
Можно загружать только .glb или .gltf
</div>

</div>

<p><strong>Превью модели</strong></p>

<div id="preview-container">
<span>Выберите файл чтобы сгенерировать превью</span>
</div>

<input type="hidden" name="image_data" id="id_image_data">

<button type="submit" id="submit-btn" class="upload-btn-submit" disabled>
🚀 Загрузить модель
</button>

</form>

<a href="{% url 'home' %}" class="back-link">
← Вернуться в галерею
</a>

</div>
</div>


<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>

<script type="module" src="{% static 'gallery/js/autothumb.js' %}"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const fileInput = document.getElementById("id_file");
    const errorBox = document.getElementById("file-error");
    const submitBtn = document.getElementById("submit-btn");

    const allowed = [".glb", ".gltf"];

    fileInput.addEventListener("change", function(){

        const file = this.files[0];

        if(!file) return;

        const ext = file.name.substring(file.name.lastIndexOf(".")).toLowerCase();

        if(!allowed.includes(ext)){
            errorBox.style.display = "block";
            submitBtn.disabled = true;
        } else {
            errorBox.style.display = "none";
            submitBtn.disabled = false;
        }

    });

});

</script>

</body>
</html>
